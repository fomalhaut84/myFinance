# myFinance — Nginx reverse proxy config
#
# 초기 설치 (HTTP only):
#   sudo cp deploy/nginx/myfinance.conf /etc/nginx/sites-available/myfinance
#   sudo ln -s /etc/nginx/sites-available/myfinance /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL 설정 (certbot이 자동으로 HTTPS 블록 추가):
#   sudo certbot --nginx -d finance.starryjeju.net

server {
    listen 80;
    server_name finance.starryjeju.net;

    # Basic auth
    auth_basic "myFinance";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;

    # Next.js 정적 파일 — 장기 캐시 (immutable hash 기반)
    location /_next/static/ {
        proxy_pass http://localhost:4100;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # favicon, 기타 정적 에셋
    location /favicon.ico {
        proxy_pass http://localhost:4100;
        expires 30d;
        access_log off;
    }

    # 리버스 프록시
    location / {
        proxy_pass http://localhost:4100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
